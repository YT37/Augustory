<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Augustory is the global platform for venture building. We partner with corporates, universities, entrepreneurs, investors and professionals to turn ideas into thriving companies and de-risk capital."
    />
    <title>Augustory Venture Studio — Build Ventures Faster</title>
    <script>
      document.documentElement.className += " js";
      // Set theme before paint to avoid a flash of the wrong theme.
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem("theme") || "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
